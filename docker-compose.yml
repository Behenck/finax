services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finax}
      POSTGRES_USER: ${POSTGRES_USER:-finax}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finax}
    volumes:
      - finax_pg_data:/var/lib/postgresql/data
    networks:
      - finax_net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://${POSTGRES_USER:-finax}:${POSTGRES_PASSWORD:-finax}@db:5432/${POSTGRES_DB:-finax}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    ports:
      - "3333:3333"
    networks:
      - finax_net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "8080:80"
    networks:
      - finax_net

volumes:
  finax_pg_data:

networks:
  finax_net: