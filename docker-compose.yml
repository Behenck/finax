version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finax}
      POSTGRES_USER: ${POSTGRES_USER:-finax}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finax}
    volumes:
      - finax_pg_data:/var/lib/postgresql/data
    networks:
      - finax_net
    deploy:
      restart_policy:
        condition: any

  api:
    image: ghcr.io/behenck/finax-api:latest
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://${POSTGRES_USER:-finax}:${POSTGRES_PASSWORD:-finax}@db:5432/${POSTGRES_DB:-finax}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      APP_WEB_URL: ${APP_WEB_URL:-http://localhost}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
    ports:
      - "3333:3333"
    networks:
      - finax_net
    depends_on:
      - db
    deploy:
      restart_policy:
        condition: any

  web:
    image: ghcr.io/behenck/finax-web:latest
    ports:
      - "${WEB_PORT:-8080}:80"
    networks:
      - finax_net
    depends_on:
      - api
    deploy:
      restart_policy:
        condition: any

volumes:
  finax_pg_data:

networks:
  finax_net:
    driver: overlay