services:
  db:
    container_name: finax-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finax}
      POSTGRES_USER: ${POSTGRES_USER:-finax}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finax}
    volumes:
      - finax_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      start_period: 10s
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    container_name: finax-api
    image: ${API_IMAGE:-finax-api:latest}
    env_file:
      - ./apps/api/.env.example
    build:
      context: .
      target: prod
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3333}
      DATABASE_URL: ${DATABASE_URL:-postgresql://finax:finax@db:5432/finax?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      APP_WEB_URL: ${APP_WEB_URL:-http://localhost:3001}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3333/sessions/google/callback}
    depends_on:
      - db
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3333/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      start_period: 20s
      interval: 10s
      timeout: 3s
      retries: 10
    ports:
      - "3333:3333"

  web:
    container_name: finax-web
    image: ${WEB_IMAGE:-finax-web:latest}
    env_file:
      - ./apps/web/.env.example
    build:
      context: .
      target: prod
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3333}
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3333}
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      start_period: 10s
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "${WEB_PORT:-3001}:80"

  web-e2e:
    container_name: finax-web-e2e
    image: ${WEB_E2E_IMAGE:-finax-web:latest}
    env_file:
      - ./apps/web/.env.example
    environment:
      CI: "true"
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3333}
    build:
      context: .
      target: prod
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3333}
    depends_on:
      - web

volumes:
  finax_pg_data:
