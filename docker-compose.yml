services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finax}
      POSTGRES_USER: ${POSTGRES_USER:-finax}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finax}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - finax_pg_data:/var/lib/postgresql/data
    networks:
      - finax_net
    deploy:
      restart_policy:
        condition: any

  api:
    image: ${API_IMAGE:-ghcr.io/seu-usuario/finax-api:latest}
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://${POSTGRES_USER:-finax}:${POSTGRES_PASSWORD:-finax}@db:5432/${POSTGRES_DB:-finax}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      APP_WEB_URL: ${APP_WEB_URL:-http://localhost}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3333}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      APP_WEB_URLS: ${APP_WEB_URLS:-}
    ports:
      - "3333:3333"
    networks:
      - finax_net
    deploy:
      restart_policy:
        condition: any

  web:
    image: ${WEB_IMAGE:-ghcr.io/seu-usuario/finax-web:latest}
    ports:
      - "80:80"
    networks:
      - finax_net
    deploy:
      restart_policy:
        condition: any

volumes:
  finax_pg_data:

networks:
  finax_net:
    driver: overlay
