services:
  db:
    container_name: finax-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finax}
      POSTGRES_USER: ${POSTGRES_USER:-finax}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finax}
    volumes:
      - finax_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      start_period: 10s
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    container_name: finax-api
    build:
      context: .
      target: prod
      dockerfile: apps/api/Dockerfile
    env_file:
      - ./apps/api/.env
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://${POSTGRES_USER:-finax}:${POSTGRES_PASSWORD:-finax}@db:5432/${POSTGRES_DB:-finax}?schema=public
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3333/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      start_period: 20s
      interval: 10s
      timeout: 3s
      retries: 10
    ports:
      - "3333:3333"

  web:
    container_name: finax-web
    build:
      context: .
      target: prod
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3333}
    env_file:
      - ./apps/web/.env
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      start_period: 10s
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "${WEB_PORT:-3000}:80"

  web-e2e:
    container_name: finax-web-e2e
    profiles: ["e2e"]
    environment:
      CI: "true"
    build:
      context: .
      target: prod
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3333}
    env_file:
      - ./apps/web/.env
    depends_on:
      web:
        condition: service_healthy

volumes:
  finax_pg_data:

networks:
  default:
    name: finax
    driver: bridge
