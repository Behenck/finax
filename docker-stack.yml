version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finax}
      POSTGRES_USER: ${POSTGRES_USER:-finax}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finax}
    volumes:
      - finax_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      start_period: 10s
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: ${API_IMAGE:-finax-api:latest}
    env_file:
      - ./apps/api/.env.example
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3333}
      DATABASE_URL: ${DATABASE_URL:-postgresql://finax:finax@db:5432/finax?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      APP_WEB_URL: ${APP_WEB_URL:-http://localhost:3000}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3333/sessions/google/callback}
    ports:
      - "3333:3333"

  web:
    image: ${WEB_IMAGE:-finax-web:latest}
    env_file:
      - ./apps/web/.env.example
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3333}
    ports:
      - "${WEB_PORT:-3000}:80"

volumes:
  finax_pg_data:
